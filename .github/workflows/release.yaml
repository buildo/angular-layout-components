name: Publish Package

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: npm ci

      - name: Get tag version
        id: get_tag_version
        run: echo "::set-output name=tag_version::${GITHUB_REF#refs/tags/}"

      - name: Update package.json version
        run: |
          cd projects/layout-components
          npm version --no-git-tag-version ${{ steps.get_tag_version.outputs.tag_version }} || true
          cd ../..
          git config --global user.name "nemobot"
          git config --global user.email "our-bots+nemobot@buildo.io"
          git diff --quiet projects/layout-components/package.json || {
            git add projects/layout-components/package.json
            git commit -m "Update package version"
            git push origin HEAD:main
          }

      - name: Build package
        run: npm run ng build layout-components

      - name: Publish to npm
        run: npm publish dist/layout-components --access public --provenance

      - name: Set up GitHub Packages registry
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: "https://npm.pkg.github.com"

      - name: Publish to Github
        run: npm publish dist/layout-components --access public
        env:
          NODE_AUTH_TOKEN: ${{ github.token }}
